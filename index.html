    --cy:#3fe7df; --blue:#46a8ff; --violet:#8f8dff;
    --accent:#3fe7df; --accent2:#8f8dff; --glow:rgba(63,231,223,.35);
    /* semantics */
    --up:#2fe6a8; --dn:#ff5d73; --good:#2fe6a8; --bad:#ff5d73; --warn:#f3b14b;
    /* chart bands */
    --center:#34d6ff; --s1:#cdd8e8; --s2:#f3b14b; --s3:#9b8cff;
    /* type */
    --display:'Space Grotesk','Inter',ui-sans-serif,system-ui,sans-serif;
    --body:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--body);font-size:14px;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  body{
    background:
      radial-gradient(1200px 720px at 50% -12%, rgba(70,168,255,.12), transparent 60%),
      radial-gradient(1000px 700px at 88% 116%, rgba(143,141,255,.12), transparent 58%),
      radial-gradient(800px 500px at 8% 30%, rgba(63,231,223,.06), transparent 60%),
      var(--bg);
    background-attachment:fixed;
  }
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;letter-spacing:-.2px}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit}
  html{scrollbar-width:thin;scrollbar-color:#3aa9ff transparent}
  ::-webkit-scrollbar{width:11px;height:11px}
  ::-webkit-scrollbar-track{background:rgba(70,168,255,.07);border-radius:11px}
  ::-webkit-scrollbar-thumb{background:linear-gradient(180deg,#62efe8,#2f9bff);border-radius:11px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:linear-gradient(180deg,#7df4ee,#46a8ff);background-clip:padding-box}
  ::selection{background:rgba(63,231,223,.28)}
  :focus-visible{outline:2px solid var(--cy);outline-offset:2px;border-radius:8px}

  .app{max-width:1200px;margin:0 auto;padding:0 14px 96px}

  /* ---------- header ---------- */
  .hdr{display:flex;align-items:flex-end;gap:11px;padding:18px 2px 12px;position:sticky;top:0;z-index:40;flex-wrap:wrap;
    background:linear-gradient(180deg,var(--bg) 64%,rgba(7,10,18,.6) 86%,transparent)}
  .brand{display:flex;align-items:center;gap:11px;padding-bottom:2px}
  .wave{filter:drop-shadow(0 2px 8px rgba(70,168,255,.5))}
  .brandtext b{font-family:var(--display);font-weight:700;font-size:22px;letter-spacing:-.4px;line-height:1;
    background:linear-gradient(100deg,#7ff4ee 0%,#5bb2ff 42%,#9a98ff 82%);background-size:220% 100%;
    -webkit-background-clip:text;background-clip:text;color:transparent;animation:sheen 7s ease-in-out infinite}
  .brandtext small{display:block;color:var(--dim);font-size:10px;letter-spacing:1.6px;text-transform:uppercase;margin-top:4px}
  @keyframes sheen{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:9px;color:var(--faint);text-transform:uppercase;letter-spacing:.8px;padding-left:3px}

  /* inputs as recessed glass */
  .sym,.cap,select.cap,textarea.cap{
    background:rgba(8,12,20,.6);color:var(--txt);border:1px solid var(--edge);border-radius:11px;
    box-shadow:inset 0 1px 3px rgba(0,0,0,.55), inset 0 0 0 1px rgba(255,255,255,.02);
    transition:border-color .15s, box-shadow .15s}
  .sym{padding:9px 12px;width:118px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;font-size:15px;font-family:var(--display)}
  .cap{padding:9px 12px;width:132px;font-weight:600;font-family:var(--mono)}
  select.cap{font-family:var(--body);font-weight:600}
  .sym:focus,.cap:focus,textarea.cap:focus,select.cap:focus{outline:none;border-color:var(--cy);
    box-shadow:inset 0 1px 3px rgba(0,0,0,.5), 0 0 0 3px rgba(63,231,223,.16), 0 0 18px -4px var(--glow)}

  /* buttons */
  .btn{position:relative;overflow:hidden;border-radius:12px;padding:10px 18px;font-weight:800;letter-spacing:.2px;
    color:#04222a;background:linear-gradient(180deg,#62efe8,#1f9bff);
    box-shadow:0 1px 0 rgba(255,255,255,.55) inset, 0 10px 22px -8px rgba(47,170,255,.65), 0 2px 6px rgba(0,0,0,.4);
    transition:filter .15s, transform .08s, box-shadow .15s}
  .btn::after{content:"";position:absolute;left:0;right:0;top:0;height:48%;
    background:linear-gradient(180deg,rgba(255,255,255,.45),transparent);pointer-events:none}
  .btn:hover{filter:brightness(1.07) saturate(1.05)}
  .btn:active{transform:translateY(1px);box-shadow:0 1px 0 rgba(255,255,255,.4) inset, 0 4px 12px -6px rgba(47,170,255,.6)}
  .btn:disabled{filter:grayscale(.4) brightness(.8);cursor:default;box-shadow:none}
  .btn.ghost{color:var(--txt);background:var(--glass);box-shadow:inset 0 1px 0 rgba(255,255,255,.08), 0 6px 16px -10px rgba(0,0,0,.8);
    border:1px solid var(--edge);font-weight:600}
  .btn.ghost::after{display:none}
  .btn.ghost:hover{background:var(--glass-hi);border-color:rgba(255,255,255,.18)}
  .btn.sm{padding:7px 12px;font-size:12px;border-radius:10px}

  /* tabs */
  .tabs{margin-left:auto;display:flex;gap:3px;padding:4px;border-radius:13px;
    background:rgba(8,12,20,.55);border:1px solid var(--edge);box-shadow:inset 0 1px 2px rgba(0,0,0,.5)}
  .tabs button{padding:8px 16px;border-radius:9px;color:var(--dim);font-weight:700;font-size:13px;transition:.15s}
  .tabs button:hover{color:var(--txt)}
  .tabs button.on{color:#04222a;background:linear-gradient(180deg,#62efe8,#2f9bff);
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset, 0 6px 16px -8px var(--glow)}

  /* ---------- glass panels ---------- */
  .card{position:relative;background:var(--glass);backdrop-filter:blur(16px) saturate(125%);-webkit-backdrop-filter:blur(16px) saturate(125%);
    border:1px solid var(--edge);border-radius:18px;padding:16px;
    box-shadow:0 1px 0 rgba(255,255,255,.07) inset, 0 24px 48px -28px rgba(0,0,0,.9)}
  .card::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;pointer-events:none;
    background:linear-gradient(160deg,rgba(255,255,255,.22),rgba(255,255,255,0) 38%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude}
  .card+.card{margin-top:13px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .grow{flex:1}
  .status{font-size:12px;color:var(--dim)} .status.err{color:var(--bad)} .status.ok{color:var(--good)}

  /* spec chips */
  .specbar{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 6px}
  .chip{position:relative;background:rgba(255,255,255,.04);border:1px solid var(--edge);border-radius:20px;
    padding:5px 12px;font-size:11px;color:var(--dim);box-shadow:inset 0 1px 0 rgba(255,255,255,.06)}
  .chip b{color:var(--txt);font-weight:700}

  /* position sizer — cockpit readout */
  .sizer{display:grid;grid-template-columns:1.15fr 1fr 1fr 1fr 1fr 1fr;
    background:var(--glass);border:1px solid var(--edge);border-radius:16px;overflow:hidden}
  .sizer .c{padding:13px 14px;border-right:1px solid rgba(255,255,255,.055)}
  .sizer .c:last-child{border-right:none}
  .sizer .k{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px}
  .sizer .v{font-size:21px;font-weight:700;margin-top:4px;font-family:var(--mono);letter-spacing:-.5px}
  .sizer .side{font-size:13px;font-weight:800;padding:3px 10px;border-radius:7px;display:inline-block;font-family:var(--display)}
  .side.long{background:rgba(47,230,168,.16);color:var(--up);box-shadow:0 0 16px -6px rgba(47,230,168,.6)}
  .side.short{background:rgba(255,93,115,.16);color:var(--dn);box-shadow:0 0 16px -6px rgba(255,93,115,.6)}
  .side.flat{background:rgba(255,255,255,.06);color:var(--dim)}

  /* stat tiles */
  .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
  .stat{position:relative;background:rgba(255,255,255,.035);border:1px solid var(--edge);border-radius:13px;padding:12px 13px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.06);transition:transform .14s, box-shadow .14s, border-color .14s}
  .stat:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.2);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.1), 0 16px 30px -18px rgba(0,0,0,.9), 0 0 24px -10px var(--glow)}
  .stat .k{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
  .stat .v{font-size:21px;font-weight:700;margin-top:4px;font-family:var(--display);letter-spacing:-.4px}
  .stat .v.pos{color:var(--good)} .stat .v.neg{color:var(--bad)}

  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--dim);margin-top:9px;align-items:center}
  .legend i{display:inline-block;width:14px;height:0;border-top:2px solid;margin-right:5px;transform:translateY(-3px)}

  /* tables */
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{text-align:right;padding:8px 9px;border-bottom:1px solid rgba(255,255,255,.06);white-space:nowrap}
  th{color:var(--dim);font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.5px;position:sticky;top:0;
    background:rgba(13,20,34,.92);backdrop-filter:blur(6px)}
  th:first-child,td:first-child{text-align:left}
  tr.trd{cursor:pointer;transition:background .12s}
  tr.trd:hover td{background:rgba(255,255,255,.045)}
  tr.trd.sel td{background:rgba(143,141,255,.14);box-shadow:inset 2px 0 0 var(--accent2)}
  .tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:800;font-family:var(--mono)}
  .tag.long{background:rgba(47,230,168,.16);color:var(--up)}
  .tag.short{background:rgba(255,93,115,.16);color:var(--dn)}
  .scrollx{overflow:auto;max-height:440px;border-radius:10px}

  pre{background:rgba(4,7,13,.7);border:1px solid var(--edge);border-radius:12px;padding:14px;overflow:auto;
    font-size:12px;color:#bfe9ff;line-height:1.55;font-family:var(--mono);white-space:pre;
    box-shadow:inset 0 1px 2px rgba(0,0,0,.6)}
  .hint{font-size:12px;color:var(--dim);line-height:1.65}
  .hint b{color:var(--txt)}
  .hint code{background:rgba(63,231,223,.1);color:var(--cy);padding:1px 6px;border-radius:6px;font-family:var(--mono);font-size:11.5px}
  .crosshair-box{pointer-events:none}
  .disc{font-size:11px;color:var(--faint);margin-top:20px;text-align:center;line-height:1.55}

  @media(max-width:680px){
    .sizer{grid-template-columns:1fr 1fr 1fr}
    .sizer .c{border-right:none;border-bottom:1px solid rgba(255,255,255,.055)}
    .tabs{order:5;margin-left:0;width:100%}
    .brandtext b{font-size:19px}
  }
  /* ---------- animated airstream loaders ---------- */
  .loadbar{height:2px;border-radius:2px;overflow:hidden;background:rgba(255,255,255,.05);margin:0 2px 10px;position:relative}
  .loadbar::before{content:"";position:absolute;top:0;left:-42%;width:42%;height:100%;border-radius:2px;
    background:linear-gradient(90deg,transparent,var(--cy),var(--blue),var(--violet),transparent);
    box-shadow:0 0 12px var(--glow);animation:loadsweep 1.05s cubic-bezier(.5,.05,.5,.95) infinite}
  @keyframes loadsweep{0%{left:-42%}100%{left:100%}}

  .splash{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:56px 0 60px}
  .windloader path{fill:none;stroke:url(#zg2);stroke-linecap:round;stroke-dasharray:48 150;
    animation:windflow 1.3s linear infinite}
  @keyframes windflow{to{stroke-dashoffset:-198}}
  .splash .lbl{font-family:var(--display);letter-spacing:.4px;color:var(--dim);font-size:13px}
  .pulse{animation:pulse 1.7s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}

  .chartwrap{position:relative}
  .chartwrap>svg:not(.airflow){position:relative;z-index:1}
  .airflow{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.16;
    -webkit-mask:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);
    mask:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent)}
  .airflow path{fill:none;stroke:url(#zflow);stroke-linecap:round;stroke-dasharray:170 230;animation:drift linear infinite}
  @keyframes drift{to{stroke-dashoffset:-800}}

  /* signal-fire flash on the Next-signal pill */
  .side.sigflash.long{animation:flashGreen 1s ease-out 2}
  .side.sigflash.short{animation:flashRed 1s ease-out 2}
  @keyframes flashGreen{
    0%{box-shadow:0 0 0 0 rgba(47,230,168,0);transform:scale(1)}
    16%{transform:scale(1.12);box-shadow:0 0 28px 3px rgba(47,230,168,.85)}
    100%{transform:scale(1);box-shadow:0 0 16px -6px rgba(47,230,168,.6)}}
  @keyframes flashRed{
    0%{box-shadow:0 0 0 0 rgba(255,93,115,0);transform:scale(1)}
    16%{transform:scale(1.12);box-shadow:0 0 28px 3px rgba(255,93,115,.85)}
    100%{transform:scale(1);box-shadow:0 0 16px -6px rgba(255,93,115,.6)}}

  /* header neon-Z mark: slow glow pulse + green/red flash on triggers (matches tab) */
  .brandmark{display:block;filter:drop-shadow(0 0 6px rgba(70,168,255,.35))}
  .brandmark .glo{opacity:.4;animation:brandpulse 3s ease-in-out infinite}
  @keyframes brandpulse{0%,100%{opacity:.28}50%{opacity:.85}}
  .brandmark.buy .glo polyline{stroke:#19e08f}
  .brandmark.sell .glo polyline{stroke:#ff3d5e}
  .brandmark.buy .zc{stroke:#2fe6a8}
  .brandmark.sell .zc{stroke:#ff5d73}
  .brandmark.buy,.brandmark.sell{filter:drop-shadow(0 0 9px rgba(47,230,168,.6))}
  .brandmark.sell{filter:drop-shadow(0 0 9px rgba(255,93,115,.6))}
  .brandmark.buy .glo,.brandmark.sell .glo{animation:brandflash .42s ease-in-out 6}
  @keyframes brandflash{0%{opacity:.45}50%{opacity:1}100%{opacity:.45}}


  /* ===== iPhone / small-screen layout ===== */
  @media(max-width:560px){
    button,a,select,input,textarea{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
    .app{padding:0 9px calc(90px + env(safe-area-inset-bottom))}
    .hdr{padding:calc(12px + env(safe-area-inset-top)) 2px 10px;gap:8px;align-items:center}
    .brandtext b{font-size:19px}
    .brandtext small{font-size:9px;letter-spacing:1px}
    .field{flex:1 1 auto;min-width:0}
    .sym,.cap,select.cap,textarea.cap,input{font-size:16px;min-height:46px;border-radius:12px}
    .btn{min-height:46px;padding:12px 16px}
    .btn.sm{min-height:40px;padding:9px 12px}
    .specbar{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:none}
    .specbar::-webkit-scrollbar{display:none}
    .chip{white-space:nowrap;flex:0 0 auto}
    .sizer{grid-template-columns:1fr 1fr}
    .sizer .c{border-right:none;border-bottom:1px solid rgba(255,255,255,.055)}
    .sizer .v{font-size:19px}
    .stats{grid-template-columns:1fr 1fr;gap:8px}
    table{font-size:12px}
    .card{padding:14px}
    .tabs{position:fixed;left:0;right:0;bottom:0;width:auto;margin:0;border-radius:16px 16px 0 0;
      padding:7px 12px calc(7px + env(safe-area-inset-bottom));gap:6px;justify-content:space-around;
      background:rgba(10,15,24,.94);backdrop-filter:blur(18px) saturate(120%);-webkit-backdrop-filter:blur(18px) saturate(120%);
      border:1px solid var(--edge);border-bottom:none;box-shadow:0 -10px 28px rgba(0,0,0,.45);z-index:60}
    .tabs button{flex:1;padding:12px 0;font-size:13px;border-radius:11px}
  }

  @media(prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>

<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/htm/3.1.1/htm.umd.js"></script>

<script>
"use strict";
if(!window.React||!window.ReactDOM||!window.htm){
  var _r=document.getElementById('root');
  if(_r){_r.innerHTML='<div style="padding:30px 22px;font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#9fb0c0;line-height:1.55;font-size:15px">Zephyr needs an internet connection to load on first open. Connect to Wi-Fi or cellular and reopen the app.</div>';}
  throw new Error("libs-unavailable");
}
var React=window.React, ReactDOM=window.ReactDOM, h=React.createElement, html=window.htm.bind(h);
var useState=React.useState, useEffect=React.useEffect, useMemo=React.useMemo, useRef=React.useRef;

/* ===== CONFIG ===== */
var API_KEY="f51f65fd0ac54a6eb1d0e6230f36fd2a";
var TD="https://api.twelvedata.com/time_series";
var LS="zephyr.v1";

/* The locked strategy (from the app screenshot) — full-range channel, 5min:
   enter on a ±2σ reclaim with the trend, target the OPPOSITE +1σ band,
   1.1×ATR(14) stop, 1% risk, 1.5× leverage. Only symbol & capital are editable. */
var STRAT={
  interval:"5min", outputsize:1500,
  zone:2,            // enter on +/-2 sigma reclaim (fade)
  targetSigma:1,     // exit at the OPPOSITE +1 sigma band
  atrPeriod:14, atrMult:1.1,
  riskPct:1, leverage:1.5
};

/* ===== MATH ===== */
function linreg(ys){
  var n=ys.length; if(n<2) return null;
  var sx=0,sy=0,sxx=0,sxy=0;
  for(var i=0;i<n;i++){ sx+=i; sy+=ys[i]; sxx+=i*i; sxy+=i*ys[i]; }
  var d=n*sxx-sx*sx; if(d===0) return null;
  var b=(n*sxy-sx*sy)/d, a=(sy-b*sx)/n;
  return {a:a,b:b};
}
// full-range straight regression channel (ToS StandardDevChannel, fullRange=yes)
function fullChannel(closes){
  var n=closes.length, center=new Array(n).fill(null), std=new Array(n).fill(null), slope=0;
  var r=linreg(closes); if(!r) return {center:center,std:std,slope:0};
  var ss=0; for(var i=0;i<n;i++){ var p=r.a+r.b*i; ss+=(closes[i]-p)*(closes[i]-p); }
  var sd=Math.sqrt(ss/n); slope=r.b;
  for(var j=0;j<n;j++){ center[j]=r.a+r.b*j; std[j]=sd; }
  return {center:center,std:std,slope:slope};
}
function atr(H,L,C,p){
  var n=C.length, tr=new Array(n).fill(0), out=new Array(n).fill(null), sum=0;
  for(var i=0;i<n;i++){ tr[i]= i===0? H[i]-L[i] : Math.max(H[i]-L[i],Math.abs(H[i]-C[i-1]),Math.abs(L[i]-C[i-1])); }
  for(var j=0;j<n;j++){ if(j<p){ sum+=tr[j]; if(j===p-1) out[j]=sum/p; } else { out[j]=(out[j-1]*(p-1)+tr[j])/p; } }
  return out;
}

/* ===== DATA ===== */
function fetchSeries(symbol, outputsize){
  var url=TD+"?symbol="+encodeURIComponent(symbol)+"&interval="+STRAT.interval+
    "&outputsize="+outputsize+"&apikey="+API_KEY+"&order=ASC&timezone=America/New_York";
  return fetch(url).then(function(r){return r.json();}).then(function(j){
    if(!j||j.status==="error") throw new Error(j&&j.message?j.message:"fetch failed");
    if(!j.values||!j.values.length) throw new Error("no data for "+symbol);
    return j.values.map(function(v){return {t:v.datetime,o:+v.open,hi:+v.high,lo:+v.low,c:+v.close,vol:+(v.volume||0)};});
  });
}

/* ===== AUTO-WATCHLIST: today's movers via Alpha Vantage (free) ===== */
function fetchMovers(key){
  var url="https://www.alphavantage.co/query?function=TOP_GAINERS_LOSERS&apikey="+encodeURIComponent(key);
  return fetch(url).then(function(r){return r.json();}).then(function(j){
    if(!j || j.Information || j.Note || j["Error Message"])
      throw new Error(j&&(j.Information||j.Note||j["Error Message"])||"movers request failed");
    function map(arr){return (arr||[]).map(function(t){
      return {sym:(t.ticker||"").toUpperCase(),
              chg:parseFloat(String(t.change_percentage||"0").replace('%','')),
              price:parseFloat(t.price||0), vol:parseFloat(t.volume||0)};
    });}
    return {gainers:map(j.top_gainers), losers:map(j.top_losers), actives:map(j.most_actively_traded)};
  });
}

/* ===== NEWS CATALYST: one batched Alpha Vantage NEWS_SENTIMENT call ===== */
function fetchNews(key, syms){
  var t=syms.slice(0,50).join(',');
  var url="https://www.alphavantage.co/query?function=NEWS_SENTIMENT&tickers="+encodeURIComponent(t)+"&sort=LATEST&limit=200&apikey="+encodeURIComponent(key);
  return fetch(url).then(function(r){return r.json();}).then(function(j){
    if(!j || j.Information || j.Note || j["Error Message"])
      throw new Error(j&&(j.Information||j.Note||j["Error Message"])||"news request failed");
    var feed=j.feed||[], now=Date.now(), map={};
    feed.forEach(function(a){
      var tp=a.time_published||"", dt=null;
      if(/^\d{8}T\d{6}$/.test(tp))
        dt=new Date(Date.UTC(+tp.slice(0,4),+tp.slice(4,6)-1,+tp.slice(6,8),+tp.slice(9,11),+tp.slice(11,13),+tp.slice(13,15)));
      (a.ticker_sentiment||[]).forEach(function(ts){
        var sym=(ts.ticker||"").toUpperCase(); if(syms.indexOf(sym)<0) return;
        var rel=parseFloat(ts.relevance_score||0); if(rel<0.1) return;
        var sc=parseFloat(ts.ticker_sentiment_score||0);
        var m=map[sym]||(map[sym]={n:0,latest:0,sum:0,wsum:0,title:'',url:''});
        m.n++; m.sum+=sc*rel; m.wsum+=rel;
        var tms=dt?dt.getTime():0;
        if(tms>m.latest){ m.latest=tms; m.title=a.title||''; m.url=a.url||''; }
      });
    });
    Object.keys(map).forEach(function(s){
      var m=map[s], avg=m.wsum?m.sum/m.wsum:0;
      m.score=avg;
      m.label=avg>=0.15?'Bullish':avg<=-0.15?'Bearish':'Neutral';
      m.fresh=!!(m.latest && (now-m.latest)<=24*3600*1000);
      m.hours=m.latest?Math.round((now-m.latest)/3600000):null;
    });
    return map;
  });
}

/* ===== BACKTEST (locked rules) ===== */
function run(bars, capital){
  var n=bars.length;
  var C=bars.map(function(b){return b.c;}), H=bars.map(function(b){return b.hi;}), L=bars.map(function(b){return b.lo;});
  var ch=fullChannel(C);
  var A=atr(H,L,C,STRAT.atrPeriod);
  var biasUp=ch.slope>0, biasDn=ch.slope<0;
  var trades=[], pos=null, warm=STRAT.atrPeriod+2;

  for(var i=warm;i<n-1;i++){
    var b=bars[i];
    if(pos){
      pos.bars++;
      var ex=null, why=null;
      var tgt=pos.side==='long'?ch.center[i]+STRAT.targetSigma*ch.std[i]:ch.center[i]-STRAT.targetSigma*ch.std[i];
      if(pos.side==='long'){
        if(b.lo<=pos.stop){ ex=pos.stop; why='stop'; }
        else if(b.hi>=tgt){ ex=tgt; why='target'; }
      } else {
        if(b.hi>=pos.stop){ ex=pos.stop; why='stop'; }
        else if(b.lo<=tgt){ ex=tgt; why='target'; }
      }
      if(ex!=null){
        var rr=pos.side==='long'?(ex-pos.entry)/pos.risk:(pos.entry-ex)/pos.risk;
        var pl=pos.side==='long'?(ex-pos.entry)*pos.shares:(pos.entry-ex)*pos.shares;
        trades.push({side:pos.side,tin:pos.tin,iin:pos.iin,tout:b.t,iout:i,entry:pos.entry,exit:ex,
          stop:pos.stop,target:pos.target,shares:pos.shares,r:rr,pl:pl,why:why,bars:pos.bars});
        pos=null;
      }
    }
    if(pos) continue;
    if(ch.center[i]==null||A[i]==null) continue;
    var c=ch.center[i], s=ch.std[i];
    var lowL=c-STRAT.zone*s, lowLp=ch.center[i-1]-STRAT.zone*ch.std[i-1];
    var upL =c+STRAT.zone*s, upLp =ch.center[i-1]+STRAT.zone*ch.std[i-1];
    var goLong  = biasUp && C[i-1]<=lowLp && C[i]>lowL;
    var goShort = biasDn && C[i-1]>=upLp  && C[i]<upL;
    if(!goLong&&!goShort) continue;
    var side=goLong?'long':'short', fill=bars[i+1].o;
    var stop=side==='long'?fill-A[i]*STRAT.atrMult:fill+A[i]*STRAT.atrMult;
    var risk=Math.abs(fill-stop); if(risk<=0||!isFinite(risk)) continue;
    var target=side==='long'?c+STRAT.targetSigma*s:c-STRAT.targetSigma*s; // opposite +1σ band
    var capShares=Math.floor((capital*STRAT.leverage)/fill);
    var riskShares=Math.floor((capital*(STRAT.riskPct/100))/risk);
    var shares=Math.max(1,Math.min(capShares,riskShares));
    pos={side:side,entry:fill,stop:stop,target:target,risk:risk,shares:shares,tin:bars[i+1].t,iin:i+1,bars:0};
  }
  if(pos){
    var last=bars[n-1];
    var rr2=pos.side==='long'?(last.c-pos.entry)/pos.risk:(pos.entry-last.c)/pos.risk;
    trades.push({side:pos.side,tin:pos.tin,iin:pos.iin,tout:last.t,iout:n-1,entry:pos.entry,exit:last.c,
      stop:pos.stop,target:pos.target,shares:pos.shares,
      r:rr2,pl:(pos.side==='long'?(last.c-pos.entry):(pos.entry-last.c))*pos.shares,why:'open',bars:pos.bars});
  }
  return {trades:trades, ch:ch, atr:A, bars:bars};
}

function stats(tr){
  var n=tr.length; if(!n) return {n:0};
  var w=tr.filter(function(t){return t.r>0;}), l=tr.filter(function(t){return t.r<=0;});
  var sumR=tr.reduce(function(a,t){return a+t.r;},0), sumPL=tr.reduce(function(a,t){return a+t.pl;},0);
  var gW=w.reduce(function(a,t){return a+t.r;},0), gL=Math.abs(l.reduce(function(a,t){return a+t.r;},0));
  var eq=0,peak=0,dd=0,curve=[0];
  tr.forEach(function(t){eq+=t.r;curve.push(eq);if(eq>peak)peak=eq;if(peak-eq>dd)dd=peak-eq;});
  return {n:n,win:w.length,loss:l.length,winRate:w.length/n*100,avgR:sumR/n,totalR:sumR,totalPL:sumPL,
    avgWin:w.length?gW/w.length:0,avgLoss:l.length?-gL/l.length:0,pf:gL>0?gW/gL:(gW>0?99:0),
    maxDD:dd,avgBars:tr.reduce(function(a,t){return a+t.bars;},0)/n,curve:curve};
}

// next-trade plan + live read
function plan(bars, capital){
  var C=bars.map(function(b){return b.c;}), H=bars.map(function(b){return b.hi;}), L=bars.map(function(b){return b.lo;});
  var ch=fullChannel(C); var A=atr(H,L,C,STRAT.atrPeriod);
  var i=bars.length-1; if(ch.center[i]==null||A[i]==null) return null;
  var c=ch.center[i], s=ch.std[i], px=C[i];
  var z=s>0?(px-c)/s:0;
  var trend=ch.slope>0?'up':ch.slope<0?'down':'flat';
  var side=trend==='up'?'long':trend==='down'?'short':'flat';
  // reclaim signal on the most recent closed bar (±2σ fade, with trend)
  var lowL=c-STRAT.zone*s, lowLp=ch.center[i-1]-STRAT.zone*ch.std[i-1];
  var upL=c+STRAT.zone*s, upLp=ch.center[i-1]+STRAT.zone*ch.std[i-1];
  var fired='—';
  if(trend==='up' && C[i-1]<=lowLp && C[i]>lowL) fired='BUY';
  else if(trend==='down' && C[i-1]>=upLp && C[i]<upL) fired='SELL';
  // sizing off last close + ATR stop, target = opposite +1σ band
  var entry=px, stop=side==='long'?px-A[i]*STRAT.atrMult:px+A[i]*STRAT.atrMult;
  var risk=Math.abs(entry-stop);
  var target=side==='long'?c+STRAT.targetSigma*s:c-STRAT.targetSigma*s;
  var capShares=Math.floor((capital*STRAT.leverage)/entry);
  var riskShares=risk>0?Math.floor((capital*(STRAT.riskPct/100))/risk):0;
  var shares=Math.max(0,Math.min(capShares,riskShares));
  return {px:px,z:z,trend:trend,side:side,fired:fired,entry:entry,stop:stop,target:target,
    risk:risk,shares:shares,dollarRisk:shares*risk,cost:shares*entry,atr:A[i],slope:ch.slope};
}

/* ===== scan ranking: Armed / Triggered / Extended + composite score ===== */
function scanScore(r){
  if(r.err) return r;
  var z=r.z||0, trend=r.trend, fired=r.fired;
  var state='Idle', sp=0.08;
  if(fired==='BUY'||fired==='SELL'){ state='Triggered'; sp=1.0; }
  else if(trend==='up'){ if(z<=-1.9){state='Armed';sp=0.7;} else if(z>=0.9){state='Extended';sp=0.22;} }
  else if(trend==='down'){ if(z>=1.9){state='Armed';sp=0.7;} else if(z<=-0.9){state='Extended';sp=0.22;} }
  var thin=(r.n||0)<8;
  var expN=Math.max(0,Math.min(1,((r.avgR||0)+0.5)/2.5));
  var pfN =Math.max(0,Math.min(1,((r.pf||0)-1)/2));
  var edge=thin?0.3:(0.6*expN+0.4*pfN);
  var prox=(fired!=='—'&&fired!==undefined&&state==='Triggered')?1
          :state==='Armed'?Math.max(0,Math.min(1,(Math.abs(z)-1.5)/1.5))
          :state==='Extended'?0.2:0.05;
  var rr=r.risk>0?Math.abs((r.target||0)-(r.entry||0))/r.risk:0;
  var rrN=Math.max(0,Math.min(1,rr/4));
  var slopeBps=(r.slope&&r.px)?Math.abs(r.slope)/r.px*10000:0;
  var trendN=Math.max(0,Math.min(1,slopeBps/3));
  var score=100*(0.30*sp+0.30*edge+0.20*prox+0.10*rrN+0.10*trendN);
  return Object.assign({},r,{state:state,score:Math.round(score),rr:rr,thin:thin});
}
function stateRank(s){ return s==='Triggered'?3:s==='Armed'?2:s==='Extended'?1:0; }

/* ===== CHART (crosshair + focus zoom + markers) ===== */
function Chart(props){
  var bars=props.bars, ch=props.ch, trades=props.trades, focus=props.focus, height=440;
  var svgRef=useRef(null);
  var hoverState=useState(null); var hover=hoverState[0], setHover=hoverState[1];
  var W=1120,H=height,padR=60,padL=8,padT=12,padB=30;

  var start, view;
  if(focus){ start=Math.max(0,focus.s); view=bars.slice(start, Math.min(bars.length,focus.e+1)); }
  else { var show=(props.window==='all')?bars.length:Math.min(bars.length,props.window||300);
         start=bars.length-show; view=bars.slice(start); }

  var lo=Infinity,hi=-Infinity;
  for(var i=0;i<view.length;i++){ var gi=start+i;
    lo=Math.min(lo,view[i].lo, ch.center[gi]!=null?ch.center[gi]-2.5*ch.std[gi]:Infinity);
    hi=Math.max(hi,view[i].hi, ch.center[gi]!=null?ch.center[gi]+2.5*ch.std[gi]:-Infinity); }
  if(!isFinite(lo)||!isFinite(hi)){lo=0;hi=1;}
  var pd=(hi-lo)*0.06; lo-=pd; hi+=pd;
  var plotW=W-padR-padL, plotH=H-padT-padB;
  var x=function(idx){return padL+(idx+0.5)/view.length*plotW;};
  var y=function(p){return padT+(hi-p)/(hi-lo)*plotH;};
  var cw=Math.max(0.7, plotW/view.length*0.62);

  function bandLine(m,sg){var pts=[];for(var i=0;i<view.length;i++){var gi=start+i;if(ch.center[gi]==null)continue;
    pts.push(x(i)+","+y(ch.center[gi]+sg*m*ch.std[gi]));}return pts.join(" ");}
  var centerPts=[];for(var j=0;j<view.length;j++){var gj=start+j;if(ch.center[gj]==null)continue;centerPts.push(x(j)+","+y(ch.center[gj]));}

  var markers=[];
  var lastTi=(trades||[]).length-1;
  (trades||[]).forEach(function(t,ti){
    var latest = ti===lastTi;
    if(t.iin>=start&&t.iin<start+view.length){markers.push({x:x(t.iin-start),y:y(t.entry),side:t.side,kind:'in',sel:focus&&focus.t===t,latest:latest});}
    if(t.iout>=start&&t.iout<start+view.length){markers.push({x:x(t.iout-start),y:y(t.exit),side:t.side,kind:'out',win:t.r>0,sel:focus&&focus.t===t,latest:latest});}
  });
  var reduce=(typeof window!=='undefined'&&window.matchMedia)?window.matchMedia('(prefers-reduced-motion: reduce)').matches:false;
  // focused trade: draw entry/stop/target guide lines
  var guides=null;
  if(focus&&focus.t){var t=focus.t;guides={entry:y(t.entry),stop:y(t.stop),target:y(t.target)};}

  var grid=[];for(var g=0;g<=4;g++){var gv=lo+(hi-lo)*g/4;grid.push({y:y(gv),v:gv});}

  function fmt(tt){return tt&&tt.length>10?tt.slice(5,16):(tt?tt.slice(5):'');}
  var nLab=Math.min(7,view.length),xl=[];
  for(var Lx=0;Lx<nLab;Lx++){var idx=Math.round(Lx*(view.length-1)/(nLab-1||1));xl.push({x:x(idx),txt:fmt(view[idx].t)});}

  function onMove(e){
    var svg=svgRef.current; if(!svg)return;
    var rect=svg.getBoundingClientRect();
    var fx=(e.clientX-rect.left)/rect.width*W;
    var idx=Math.round((fx-padL)/plotW*view.length-0.5);
    if(idx<0)idx=0; if(idx>=view.length)idx=view.length-1;
    var gi=start+idx, bb=view[idx];
    var z=ch.std[gi]>0?(bb.c-ch.center[gi])/ch.std[gi]:0;
    setHover({idx:idx,x:x(idx),bar:bb,z:z});
  }
  function onLeave(){setHover(null);}

  return html`<svg ref=${svgRef} viewBox=${"0 0 "+W+" "+H} width="100%" style=${{display:'block',cursor:'crosshair'}}
      onMouseMove=${onMove} onMouseLeave=${onLeave}>
    <defs>
      <filter id="mkglow" x="-80%" y="-80%" width="260%" height="260%">
        <feDropShadow dx="0" dy="0" stdDeviation="2.4" flood-color="#ffffff" flood-opacity="0.25"/>
      </filter>
    </defs>
    ${grid.map(function(g,gi){return html`<g key=${'g'+gi}>
      <line x1=${padL} y1=${g.y} x2=${W-padR} y2=${g.y} stroke="#141c27"/>
      <text x=${W-padR+5} y=${g.y+3} fill="#5a6573" font-size="10" font-family="monospace">${g.v.toFixed(2)}</text></g>`;})}
    <polyline points=${bandLine(2.5,1)} fill="none" stroke="var(--s3)" stroke-width="1" opacity="0.5"/>
    <polyline points=${bandLine(2.5,-1)} fill="none" stroke="var(--s3)" stroke-width="1" opacity="0.5"/>
    <polyline points=${bandLine(2,1)} fill="none" stroke="var(--s2)" stroke-width="1" opacity="0.7"/>
    <polyline points=${bandLine(2,-1)} fill="none" stroke="var(--s2)" stroke-width="1" opacity="0.7"/>
    <polyline points=${bandLine(1,1)} fill="none" stroke="var(--s1)" stroke-width="1.2" opacity="0.85"/>
    <polyline points=${bandLine(1,-1)} fill="none" stroke="var(--s1)" stroke-width="1.2" opacity="0.85"/>
    <polyline points=${centerPts.join(" ")} fill="none" stroke="var(--center)" stroke-width="1.5"/>
    ${guides? html`<g>
      <line x1=${padL} y1=${guides.entry} x2=${W-padR} y2=${guides.entry} stroke="var(--accent2)" stroke-dasharray="4 3" opacity="0.8"/>
      <line x1=${padL} y1=${guides.target} x2=${W-padR} y2=${guides.target} stroke="var(--good)" stroke-dasharray="4 3" opacity="0.7"/>
      <line x1=${padL} y1=${guides.stop} x2=${W-padR} y2=${guides.stop} stroke="var(--bad)" stroke-dasharray="4 3" opacity="0.7"/>
      <text x=${padL+4} y=${guides.target-3} fill="var(--good)" font-size="10" font-family="monospace">target</text>
      <text x=${padL+4} y=${guides.stop-3} fill="var(--bad)" font-size="10" font-family="monospace">stop</text>
    </g>`:null}
    ${view.map(function(b,i){var up=b.c>=b.o;var col=up?'var(--up)':'var(--dn)';
      return html`<g key=${'c'+i}>
        <line x1=${x(i)} y1=${y(b.hi)} x2=${x(i)} y2=${y(b.lo)} stroke=${col}/>
        <rect x=${x(i)-cw/2} y=${y(Math.max(b.o,b.c))} width=${cw} height=${Math.max(1,Math.abs(y(b.o)-y(b.c)))} fill=${col}/>
      </g>`;})}
    ${markers.map(function(m,i){
      var col = m.kind==='in' ? (m.side==='long'?'var(--up)':'var(--dn)') : (m.win?'var(--good)':'var(--bad)');
      if(m.kind==='in'){
        var up=m.side==='long';

function Equity(p){

  var W=1120,H=80,pad=6, lo=Math.min.apply(null,c),hi=Math.max.apply(null,c); if(hi===lo){hi+=1;lo-=1;}
  var x=function(i){return pad+i/(c.length-1)*(W-2*pad);}, y=function(v){return pad+(hi-v)/(hi-lo)*(H-2*pad);};
  return html`<svg viewBox=${"0 0 "+W+" "+H} width="100%" style=${{display:'block'}}>
    <line x1=${pad} y1=${y(0)} x2=${W-pad} y2=${y(0)} stroke="#2a3645" stroke-dasharray="3 3"/>

var _audio=null;
function ensureAudio(){
  try{ if(!_audio){ _audio=new (window.AudioContext||window.webkitAudioContext)(); }
    if(_audio.state==='suspended'){ _audio.resume(); } }catch(e){}
  return _audio;
}
function chime(side){
  var ctx=ensureAudio(); if(!ctx) return;
  var now=ctx.currentTime;
  var freqs = (side==='SELL') ? [784,523] : [523,784]; // down vs up arpeggio
  freqs.forEach(function(f,k){
    var o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.type='sine'; o.frequency.value=f;
    var t0=now+k*0.16;
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(0.35,t0+0.03);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+0.30);
    o.start(t0); o.stop(t0+0.32);
  });
}
function notify(title,body){
  try{ if(typeof Notification!=='undefined' && Notification.permission==='granted'){
    var n=new Notification(title,{body:body,tag:'zephyr'}); setTimeout(function(){try{n.close();}catch(e){}},9000);
  }}catch(e){}
}

var BUY_PHRASES=[
  "Buy. The wind's at your back.",
  "Buy. Catch the updraft.",
  "Go long. Ride the tailwind home.",
  "Buy. The breeze turns bullish.",
  "Buy. Let the current carry you up."
];
var SELL_PHRASES=[
  "Sell. The wind shifts against it.",
  "Sell. Fade the gust.",
  "Short it. Catch the downdraft.",
  "Sell. The breeze turns bearish.",
  "Sell. The air's coming out."
];
function listVoices(){
  try{ return (window.speechSynthesis.getVoices()||[]).filter(function(v){return /^en/i.test(v.lang);}); }catch(e){ return []; }
}
function pickVoice(name){
  var vs=listVoices(); if(!vs.length) return null;
  if(name){ var m=vs.filter(function(v){return v.name===name;})[0]; if(m) return m; }
  // soothing, accented female voices, in order of preference
  var pref=["Serena","Moira","Fiona","Tessa","Karen","Veena","Catherine","Google UK English Female",
            "Microsoft Sonia","Microsoft Libby","Microsoft Hazel","Microsoft Natasha","Microsoft Aria","Samantha"];
  for(var i=0;i<pref.length;i++){ var f=vs.filter(function(v){return v.name.indexOf(pref[i])>=0;})[0]; if(f) return f; }
  var accent=vs.filter(function(v){return /en-(GB|AU|IE|ZA|IN)/i.test(v.lang);})[0];
  return accent || vs[0];
}
function speak(kind, voiceName){
  try{
    var synth=window.speechSynthesis;
    if(!synth){ chime(kind==='SELL'?'SELL':'BUY'); return; }      // fallback if no TTS
    var text = kind==='SELL' ? SELL_PHRASES[Math.floor(Math.random()*SELL_PHRASES.length)]
             : kind==='BUY'  ? BUY_PHRASES[Math.floor(Math.random()*BUY_PHRASES.length)]
             : "Zephyr is armed. I'll call your trades.";
    synth.cancel();
    var u=new SpeechSynthesisUtterance(text);
    var v=pickVoice(voiceName); if(v) u.voice=v;
    u.rate=0.9; u.pitch=1.05; u.volume=1;                          // unhurried & soft
    synth.speak(u);
  }catch(e){}
}
function say(text, voiceName){
  try{
    var synth=window.speechSynthesis; if(!synth) return;
    synth.cancel();
    var u=new SpeechSynthesisUtterance(text);
    var v=pickVoice(voiceName); if(v) u.voice=v;
    u.rate=0.96; u.pitch=1.04; u.volume=1;
    synth.speak(u);
  }catch(e){}
}

/* ===== animated tab favicon: slow glow pulse + green/red flash on triggers ===== */
function startFaviconFX(){
  if(typeof document==='undefined') return null;
  try{
    var SZ=64, cvs=document.createElement('canvas'); cvs.width=SZ; cvs.height=SZ;
    var ctx=cvs.getContext('2d'); if(!ctx) return null;
    // take over the icon: drop static links, add our live PNG link
    Array.prototype.slice.call(document.querySelectorAll('link[rel~="icon"]')).forEach(function(l){
      if(!l.hasAttribute('data-fx')) l.parentNode.removeChild(l);
    });
    var link=document.querySelector('link[rel="icon"][data-fx]');
    if(!link){ link=document.createElement('link'); link.rel='icon'; link.type='image/png'; link.setAttribute('data-fx','1'); document.head.appendChild(link); }
    function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
    var t0=Date.now(), flashUntil=0, flashSide=null, s=SZ/100;
    function draw(){
      var now=Date.now();
      var pulse=0.5+0.5*Math.sin((now-t0)/1500*Math.PI);   // ~3s breath
      var flashing=now<flashUntil;
      var blink=flashing?(0.4+0.6*Math.abs(Math.sin(now/110))):1;
      ctx.clearRect(0,0,SZ,SZ);
      var bg=ctx.createLinearGradient(0,0,0,SZ); bg.addColorStop(0,'#0e1628'); bg.addColorStop(1,'#06090f');
      rr(1,1,SZ-2,SZ-2,15); ctx.fillStyle=bg; ctx.fill();
      ctx.beginPath(); ctx.arc(SZ/2,SZ/2,SZ*0.44,0,Math.PI*2); ctx.strokeStyle='rgba(63,231,223,0.13)'; ctx.lineWidth=0.7; ctx.stroke();
      // motion streaks
      ctx.lineCap='round'; ctx.lineWidth=2.4; ctx.strokeStyle='rgba(98,239,232,'+(0.5*(flashing?0.5:1))+')';
      [[5,17,25],[4,18,32],[5,17,39]].forEach(function(a){ ctx.beginPath(); ctx.moveTo(a[0],a[2]); ctx.lineTo(a[1],a[2]); ctx.stroke(); });
      // the Z
      var c1,c2,gc;
      if(flashing&&flashSide==='SELL'){ c1='#ff8aa0'; c2='#ff3d5e'; gc='rgba(255,93,115,'; }
      else if(flashing&&flashSide==='BUY'){ c1='#8af7c8'; c2='#19e08f'; gc='rgba(47,230,168,'; }
      else { c1='#6ef4ec'; c2='#3c96ff'; gc='rgba(70,168,255,'; }
      ctx.save();
      var cc=SZ/2;
      ctx.translate(cc,cc); ctx.transform(1,0,Math.tan(-11*Math.PI/180),1,0,0); ctx.translate(-cc,-cc);
      var g=ctx.createLinearGradient(0,0,SZ,SZ); g.addColorStop(0,c1); g.addColorStop(1,c2);
      ctx.strokeStyle=g; ctx.lineWidth=SZ*0.135; ctx.lineJoin='miter'; ctx.lineCap='butt';
      ctx.shadowColor=gc+(flashing?0.95:(0.4+0.5*pulse))+')';
      ctx.shadowBlur=(flashing?11:(4+8*pulse))*blink;
      ctx.beginPath();
      ctx.moveTo(32*s,35*s); ctx.lineTo(68*s,35*s); ctx.lineTo(32*s,65*s); ctx.lineTo(68*s,65*s);
      ctx.stroke();
      if(flashing){ ctx.shadowBlur=16*blink; ctx.stroke(); } // extra bloom on flash
      ctx.restore();
      try{ link.href=cvs.toDataURL('image/png'); }catch(e){}
    }
    var iv=setInterval(draw,140); draw();
    return { flash:function(side){ flashSide=(side==='SELL'||side==='short')?'SELL':'BUY'; flashUntil=Date.now()+2800; }, stop:function(){clearInterval(iv);} };
  }catch(e){ return null; }
}

  function runScan(symsArg, isAuto){
    var syms=(Array.isArray(symsArg)?symsArg:null) || wl.split(/[\s,]+/).map(function(x){return x.trim().toUpperCase();}).filter(Boolean);
    syms=syms.filter(function(v,i){return syms.indexOf(v)===i;});
    if(!syms.length){showToast("Add symbols first");return;}
    persist({watchlist:syms.join(", ")}); setScanning(true); setRows([]); if(!isAuto) setNewsMap({});
    var out=[],idx=0;
    function finish(){
      setScanning(false); setProg("");
      var done=function(nm){ if(nm) setNewsMap(nm); if(voiceScan) announceTop(out, nm||newsMap); };
      if(newsOn && !isAuto && (polyKey||'').trim()){
        setProg("news…");
        fetchNews((polyKey||'').trim(), syms).then(function(nm){ setProg(""); done(nm); })
          .catch(function(e){ setProg(""); showToast("News: "+e.message); done({}); });
      } else { done(null); }
    }
    function step(){
      if(idx>=syms.length){ finish(); return; }
      var sym=syms[idx]; setProg((idx+1)+"/"+syms.length+" "+sym);
      fetchSeries(sym,STRAT.outputsize).then(function(b){
        var p=plan(b,capital), r=run(b,capital), sx=stats(r.trades);
        out.push(Object.assign({sym:sym},p||{px:0,z:0,trend:'?',fired:'—'},{n:sx.n||0,winRate:sx.winRate||0,avgR:sx.avgR||0,totalR:sx.totalR||0,pf:sx.pf||0}));
      }).catch(function(e){out.push({sym:sym,err:e.message});}).then(function(){
        var scored=out.map(scanScore);
        setRows(scored.slice().sort(function(a,b){
          if(a.err&&!b.err)return 1; if(b.err&&!a.err)return -1;
          var sr=stateRank(b.state)-stateRank(a.state); if(sr)return sr;
          return (b.score||0)-(a.score||0);
        }));
        idx++; setTimeout(step,8000);
      });
    }
    step();
  }

      });}
      var g=clean(m.gainers).sort(function(a,b){return b.chg-a.chg;});
      var l=clean(m.losers).sort(function(a,b){return a.chg-b.chg;});
      var picks;
      if(buildDir==='gainers') picks=g.slice(0,buildCount);

      else { var half=Math.ceil(buildCount/2); picks=g.slice(0,half).concat(l.slice(0,buildCount-half)); }
      var syms=picks.map(function(x){return x.sym;}).filter(function(v,i,a){return a.indexOf(v)===i;});

      if(!syms.length){ setBuildMsg("No movers matched your price/volume filters — try lowering Min price."); return; }
      setBuildMsg("Built "+syms.length+" movers — ranking now");
      setWl(syms.join(", ")); persist({watchlist:syms.join(", ")});
      setTimeout(function(){ runScan(syms); }, 150);

                  color:newsMap[r.sym].label==='Bullish'?'var(--up)':newsMap[r.sym].label==='Bearish'?'var(--dn)':'var(--dim)',
                  background:newsMap[r.sym].label==='Bullish'?'rgba(47,230,168,.14)':newsMap[r.sym].label==='Bearish'?'rgba(255,93,115,.14)':'rgba(255,255,255,.05)',
                  opacity:newsMap[r.sym].fresh?1:0.5}}>${newsMap[r.sym].fresh?'NEWS':(newsMap[r.sym].hours>48?Math.round(newsMap[r.sym].hours/24)+'d':newsMap[r.sym].hours+'h')}</a>`:null}
            </td>
            <td>
              <div style=${{display:'flex',alignItems:'center',gap:'7px'}}>
                <span class="mono" style=${{fontWeight:800,color:scCol,minWidth:'22px'}}>${r.score}</span>
                <span style=${{flex:1,height:'5px',minWidth:'40px',borderRadius:'4px',background:'rgba(255,255,255,.08)',overflow:'hidden'}}>
                  <span style=${{display:'block',height:'100%',width:(Math.max(3,Math.min(100,r.score))+'%'),background:'linear-gradient(90deg,var(--cy),var(--blue))'}}></span>
                </span>
              </div>
            </td>
            <td style=${{textAlign:'left'}}><span style=${{display:'inline-block',padding:'2px 9px',borderRadius:'20px',fontSize:'11px',fontWeight:800,color:stCol,background:stBg}}>${stTxt}</span>${r.thin?html`<span class="mono" style=${{color:'var(--faint)',fontSize:'10px',marginLeft:'6px'}}>thin</span>`:null}</td>
            <td class="mono">${r.px.toFixed(2)}</td>
            <td class="mono" style=${{color:r.z<=-1?'var(--good)':r.z>=1?'var(--bad)':'var(--txt)'}}>${(r.z>=0?'+':'')+r.z.toFixed(2)}</td>
            <td style=${{color:r.trend==='up'?'var(--good)':r.trend==='down'?'var(--bad)':'var(--dim)'}}>${r.trend}</td>
            <td class="mono">${r.rr?r.rr.toFixed(1):'—'}</td>
            <td class="mono">${r.shares||'—'}</td>
            <td class="mono">${r.n}</td>
            <td class="mono">${r.n?r.winRate.toFixed(0)+'%':'—'}</td>
            <td class="mono" style=${{color:r.avgR>0?'var(--good)':'var(--bad)'}}>${r.n?(r.avgR>=0?'+':'')+r.avgR.toFixed(2):'—'}</td>
            <td class="mono">${r.n?r.pf.toFixed(2):'—'}</td>
          </tr>`;})}</tbody>
      </table></div><div class="hint" style=${{marginTop:'8px'}}><b style=${{color:'var(--txt)'}}>Triggered</b> = reclaim just printed (act). <b style=${{color:'var(--txt)'}}>Armed</b> = stretched past ±2σ, waiting to reclaim (pre-position). <b style=${{color:'var(--txt)'}}>Extended</b> = already moved toward target (likely too late). Score blends backtest edge, how imminent the setup is, R:R to the +1σ target, and trend strength; <b style=${{color:'var(--txt)'}}>thin</b> means under 8 backtested trades, so trust it less. With <b style=${{color:'var(--txt)'}}>News</b> on, a green/red <b style=${{color:'var(--txt)'}}>NEWS</b> tag flags a fresh catalyst (≤24h) colored by sentiment — tap it to read the story. Tap a row to load it.</div></div>`:null}
    </div>`:null}

    ${tab==='tos'? html`<div>
      <div class="card">
        <div class="row" style=${{marginBottom:'10px'}}>
          <div class="status grow"><b style=${{color:'var(--txt)'}}>Chart study</b> for <b style=${{color:'var(--txt)'}}>${symbol}</b> — lines, BUY/SELL arrows, size label, and built-in alerts. Paste into <b style=${{color:'var(--txt)'}}>Studies → Edit Studies → Create study</b>.</div>
          <button class="btn sm" onClick=${copyTS}>Copy study</button>
        </div>
        <pre>${thinkScript(symbol,capital)}</pre>
        <div class="hint" style=${{marginTop:'10px'}}>Add to a <b>5-minute</b> chart. This now draws the same <b>straight full-range</b> channel as the app (via <code>InertiaAll</code>), so the lines match. To line them up exactly, set the chart to show a similar range — the app loads ~1500 5m bars (~1 month), so use a <b>1M / 5m</b> chart, not 5D. The <code>Alert()</code> lines fire a sound + notification once per bar on a signal.</div>
      </div>
      <div class="card">
        <div class="row" style=${{marginBottom:'10px'}}>
          <div class="status grow"><b style=${{color:'var(--txt)'}}>Scanner</b> — finds every symbol with a fresh ±2σ reclaim right now. Paste into <b style=${{color:'var(--txt)'}}>Scan → Add filter → Study → thinkScript editor</b>.</div>
          <select class="cap mono" style=${{width:'150px',padding:'5px 8px'}}
            value=${scanMode} onChange=${function(e){setScanMode(e.target.value);persist({scanMode:e.target.value});}}>
            <option value="fixed">Fixed 1000-bar</option>
            <option value="full">Full-range</option>
          </select>
          <button class="btn sm" onClick=${copyScan}>Copy scan</button>
        </div>
        <pre>${scanScript(scanMode)}</pre>
        <div class="hint" style=${{marginTop:'10px'}}>Set the scan's <b style=${{color:'var(--txt)'}}>Aggregation period to 5 min</b> (top-left of the filter — not D), add this filter, and run it. Edit the last line to <code>plot scan = buy;</code> for longs only or <code>plot scan = sell;</code> for shorts only, then save it as a recurring <b>scan alert</b>.
          <br/><br/>ToS caps scans at <b>2000 historical bars</b>, and the residual-std calc looks back ~2× the window — so the fixed variant tops out at <b>1000 bars</b> (1500 would need ~3000). A 1000-bar regression is still long and near-straight. <b style=${{color:'var(--txt)'}}>Full-range</b> fits over whatever history ToS loads. Either way, confirm a hit on your 5m chart or in Zephyr's Scan tab (which uses the exact 1500-bar engine) before acting.</div>
      </div>
    </div>`:null}

    <div class="disc">Zephyr · research &amp; education only — not financial advice. Backtests are historical, ignore slippage/fees, and the full-range channel uses hindsight. Validate before risking capital.</div>
    ${toast? html`<div style=${{position:'fixed',bottom:'22px',left:'50%',transform:'translateX(-50%)',background:'var(--panel2)',border:'1px solid var(--line)',borderRadius:'10px',padding:'10px 16px',fontSize:'13px',zIndex:50,boxShadow:'0 8px 24px rgba(0,0,0,.5)'}}>${toast}</div>`:null}
  </div>`;
}
ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
